issuer: http://localhost:5556/dex

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

telemetry:
  http: 0.0.0.0:5558

# Local-password connector — users defined inline.
enablePasswordDB: true

staticClients:
  - id: pixeleruv
    redirectURIs:
      - "http://localhost:5173/auth/callback"
      - "http://localhost:4080/auth/callback"
      - "https://__PUBLIC_HOST__:4043/auth/callback"
    name: "PixelEruv"
    public: true

# Local users (bcrypt hashes, cost 10).
# admin / password123
staticPasswords:
  - email: "admin@pixeleruv.local"
    hash: "$2y$10$pHMQMM3ZIvITxyWoRfIIPu681k03OI9GIQQBfYWTbTmjQzaQyPzbS"
    username: "admin"
    userID: "admin"
  - email: "player@pixeleruv.local"
    hash: "$2y$10$pHMQMM3ZIvITxyWoRfIIPu681k03OI9GIQQBfYWTbTmjQzaQyPzbS"
    username: "player"
    userID: "player"
