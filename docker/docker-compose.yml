name: pixeleruv

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped

  pocketbase:
    build:
      context: ..
      dockerfile: docker/pocketbase.Dockerfile
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    environment:
      PB_ADMIN_EMAIL: "admin@pixeleruv.local"
      PB_ADMIN_PASSWORD: "password123"
    restart: unless-stopped

  dex:
    image: ghcr.io/dexidp/dex:latest
    entrypoint: ["/entrypoint.sh"]
    environment:
      PUBLIC_HOST: "${PUBLIC_HOST:-localhost}"
    ports:
      - "5556:5556"
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml.template:ro
      - ./dex-entrypoint.sh:/entrypoint.sh:ro
      - dex_data:/var/dex
    restart: unless-stopped

  pusher:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: pusher
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      WS_ADDR: ":8081"
      DEX_ISSUER: "http://localhost:5556/dex"
      DEX_JWKS_URL: "http://dex:5556/dex/keys"
      DEX_CLIENT_ID: "pixeleruv"
      # OpenTelemetry — off by default. Set OTEL_ENABLED=true and point
      # OTEL_EXPORTER_OTLP_ENDPOINT at a reachable collector to enable.
      # In docker, 127.0.0.1 refers to the container, so use host.docker.internal
      # (or a motel service) when debugging from the host.
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://127.0.0.1:27686"
    ports:
      - "8081:8081"
    restart: unless-stopped

  worldsim:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: worldsim
    depends_on:
      - nats
      - pocketbase
    environment:
      NATS_URL: "nats://nats:4222"
      TICK_HZ: "20"
      MAP_ID: "map1"
      POCKETBASE_URL: "http://pocketbase:8090"
      PB_ADMIN_EMAIL: "admin@pixeleruv.local"
      PB_ADMIN_PASSWORD: "password123"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://127.0.0.1:27686"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - pusher
    ports:
      - "4080:80"
      # HTTPS for remote access. Browsers only expose crypto.subtle (PKCE auth)
      # in secure contexts (HTTPS or localhost). The self-signed cert is
      # generated at startup from TLS_HOSTS. Access remotely at
      # https://<host-ip>:4043 and accept the cert warning once.
      - "4043:443"
    environment:
      # Comma-separated DNS names / IPs the self-signed cert should cover.
      # Set to your host's LAN IP for remote access, e.g.
      #   TLS_HOSTS=localhost,127.0.0.1,192.168.1.10
      TLS_HOSTS: "localhost,127.0.0.1"
      # Public host (LAN IP or hostname) remote browsers use to reach this
      # machine. Drives the TLS cert SAN (auto-appended), Dex redirect URI,
      # and LiveKit public URL. Defaults to localhost (same-machine dev).
      PUBLIC_HOST: "${PUBLIC_HOST:-localhost}"
    restart: unless-stopped

  ext-demo:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: ext-demo
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      EXTENSION_ID: "demo"
    restart: unless-stopped

  ext-walls:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: ext-walls
    depends_on:
      - nats
      - pocketbase
    environment:
      NATS_URL: "nats://nats:4222"
      POCKETBASE_URL: "http://pocketbase:8090"
      MAP_ID: "map1"
    restart: unless-stopped

  ext-props:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: ext-props
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
    restart: unless-stopped

  # LiveKit SFU server for A/V. API keys must match ext-av.
  livekit:
    image: livekit/livekit-server:v1.13.2
    # --node-ip sets the IP advertised in WebRTC ICE candidates. Defaults to
    # 127.0.0.1 (same-machine dev via Docker port mapping). For LAN testing
    # with two machines, set LIVEKIT_NODE_IP to the host's LAN IP, e.g.
    #   LIVEKIT_NODE_IP=192.168.1.10 docker compose up
    # and point browsers at ws://<host-lan-ip>:7880 (also set
    # LIVEKIT_PUBLIC_URL in ext-av accordingly).
    command: ["--config", "/etc/livekit.yaml", "--node-ip", "${LIVEKIT_NODE_IP:-127.0.0.1}"]
    ports:
      - "7880:7880"   # WebSocket signaling
      - "7881:7881"   # TCP (fallback)
      - "7882:7882/udp" # UDP (WebRTC media)
      - "50000-50020:50000-50020/udp" # WebRTC ICE range
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  ext-av:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: ext-av
    depends_on:
      - nats
      - pocketbase
      - livekit
    environment:
      NATS_URL: "nats://nats:4222"
      POCKETBASE_URL: "http://pocketbase:8090"
      MAP_ID: "map1"
      LIVEKIT_URL: "ws://livekit:7880"
      # Browser-facing URL (host-exposed port, not Docker-internal).
      LIVEKIT_PUBLIC_URL: "ws://${PUBLIC_HOST:-localhost}:7880"
      LIVEKIT_API_KEY: "devkey"
      LIVEKIT_API_SECRET: "devsecretdevsecretdevsecretdevsecret123"
    restart: unless-stopped

volumes:
  pb_data:
  dex_data:
