name: pixeleruv

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped

  # MailHog — dev SMTP server that catches all emails in a web UI at :8025.
  # Used for email verification during registration. Production should point
  # SMTP_HOST/SMTP_PORT/SMTP_USERNAME/SMTP_PASSWORD at a real SMTP provider.
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  pusher:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: pusher
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      WS_ADDR: ":8081"
      PB_API_URL: "http://worldsim:8090/api"
      # OpenTelemetry — off by default. Set OTEL_ENABLED=true and point
      # OTEL_EXPORTER_OTLP_ENDPOINT at OpenObserve to enable.
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
    ports:
      - "8081:8081"
    restart: unless-stopped

  worldsim:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: worldsim
    depends_on:
      - nats
      - mailhog
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - pb_data:/pb_data
    environment:
      NATS_URL: "nats://nats:4222"
      TICK_HZ: "20"
      PB_DATA_DIR: "/pb_data"
      PB_HTTP_ADDR: "0.0.0.0:8090"
      PB_ADMIN_EMAIL: "admin@pixeleruv.local"
      PB_ADMIN_PASSWORD: "password123"
      # SMTP for email verification (MailHog in dev).
      SMTP_HOST: "mailhog"
      SMTP_PORT: "1025"
      SMTP_FROM: "noreply@pixeleruv.local"
      SMTP_SENDER_NAME: "PixelEruv"
      # Public URL used in verification/password-reset email links.
      # Default includes port 4043 (direct access). Override in .env if
      # behind a reverse proxy on 443 (e.g. APP_URL=https://example.com).
      APP_URL: "${APP_URL:-https://${PUBLIC_HOST:-localhost}:4043}"
      # OAuth2 providers — set client IDs/secrets in .env to enable.
      OAUTH2_GOOGLE_CLIENT_ID: "${OAUTH2_GOOGLE_CLIENT_ID:-}"
      OAUTH2_GOOGLE_SECRET: "${OAUTH2_GOOGLE_SECRET:-}"
      OAUTH2_GITHUB_CLIENT_ID: "${OAUTH2_GITHUB_CLIENT_ID:-}"
      OAUTH2_GITHUB_SECRET: "${OAUTH2_GITHUB_SECRET:-}"
      OAUTH2_FACEBOOK_CLIENT_ID: "${OAUTH2_FACEBOOK_CLIENT_ID:-}"
      OAUTH2_FACEBOOK_SECRET: "${OAUTH2_FACEBOOK_SECRET:-}"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - pusher
      - worldsim
      - audit
      - admin
    ports:
      - "4080:80"
      # HTTPS for remote access. Browsers only expose crypto.subtle (PKCE auth)
      # in secure contexts (HTTPS or localhost). The self-signed cert is
      # generated at startup from TLS_HOSTS. Access remotely at
      # https://<host-ip>:4043 and accept the cert warning once.
      - "4043:443"
    environment:
      # Comma-separated DNS names / IPs the self-signed cert should cover.
      # Set to your host's LAN IP for remote access, e.g.
      #   TLS_HOSTS=localhost,127.0.0.1,192.168.1.10
      TLS_HOSTS: "localhost,127.0.0.1"
      # Public host (LAN IP or hostname) remote browsers use to reach this
      # machine. Drives the TLS cert SAN (auto-appended), the default APP_URL
      # (email verification links), and LiveKit public URL.
      # Defaults to localhost (same-machine dev).
      PUBLIC_HOST: "${PUBLIC_HOST:-localhost}"
    volumes:
      # Read-only access to recordings for download via /recordings/ (admin-auth).
      - recordings:/var/www/recordings:ro
    restart: unless-stopped

  ext-demo:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: ext-demo
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      EXTENSION_ID: "demo"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
    restart: unless-stopped

  ext-walls:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: ext-walls
    depends_on:
      - nats
      - worldsim
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
    restart: unless-stopped

  ext-props:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: ext-props
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
    restart: unless-stopped

  # LiveKit SFU server for A/V. API keys must match ext-av.
  livekit:
    image: livekit/livekit-server:v1.13.2
    # --node-ip is a fallback ICE IP (used if STUN discovery fails). The
    # livekit.yaml has use_external_ip: true, so LiveKit auto-discovers its
    # public IP via STUN and advertises that to remote browsers. For local
    # dev, enable_loopback_candidate adds 127.0.0.1 as a candidate too.
    # Override LIVEKIT_NODE_IP only if STUN is unavailable, e.g.
    #   LIVEKIT_NODE_IP=192.168.1.10 docker compose up
    # For remote access, ensure UDP 50000-50020 are open on the host firewall.
    command: ["--config", "/etc/livekit.yaml", "--node-ip", "${LIVEKIT_NODE_IP:-127.0.0.1}"]
    depends_on:
      - redis
    ports:
      - "7880:7880"   # WebSocket signaling
      - "7881:7881"   # TCP (fallback)
      - "50000-50020:50000-50020/udp" # WebRTC ICE range
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  # Redis — message bus for LiveKit psrpc. Required for the LiveKit server
  # to forward Egress RPC calls (StartRoomCompositeEgress, StopEgress, etc.)
  # to the Egress service. Both livekit and livekit-egress depend on this.
  # No host port mapping: containers reach it via the docker network at
  # redis:6379. Avoids conflicts with a host-level redis on 127.0.0.1:6379.
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  ext-av:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: ext-av
    depends_on:
      - nats
      - worldsim
      - livekit
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
      LIVEKIT_URL: "ws://livekit:7880"
      # Browser-facing URL (host-exposed port, not Docker-internal). Defaults
      # to ws://<PUBLIC_HOST>:7880; override in .env to proxy through nginx
      # (e.g. ws://<host>/livekit — the frontend upgrades to wss:// on HTTPS).
      LIVEKIT_PUBLIC_URL: "${LIVEKIT_PUBLIC_URL:-ws://${PUBLIC_HOST:-localhost}:7880}"
      LIVEKIT_API_KEY: "devkey"
      LIVEKIT_API_SECRET: "devsecretdevsecretdevsecretdevsecret123"
    restart: unless-stopped

  # Chown the recordings volume to uid 1001:0 (egress user) on startup.
  # The egress container runs as non-root and can't write to a root-owned
  # volume. One-shot — exits after chowning.
  recordings-init:
    image: alpine:3.20
    command: ["chown", "-R", "1001:0", "/recordings"]
    volumes:
      - recordings:/recordings
    restart: "no"

  # LiveKit Egress service — records room composites to file (MP4) or streams
  # to RTMP (YouTube). ext-rec calls its API via the LiveKit server-sdk-go;
  # the SDK posts to the LiveKit server (port 7880), which forwards to Egress
  # via psrpc over Redis. Needs CPU for transcoding and disk for MP4 output.
  # The recordings volume is shared with ext-rec so both can access files.
  livekit-egress:
    image: livekit/egress:v1.9.0
    depends_on:
      recordings-init:
        condition: service_completed_successfully
      livekit:
        condition: service_started
      redis:
        condition: service_started
    environment:
      EGRESS_CONFIG_FILE: "/etc/egress.yaml"
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
      - recordings:/recordings
    restart: unless-stopped

  # ext-rec — recording extension. Admin-hosted start/stop of Room Composite
  # Egress for zone A/V rooms. Two targets: "mp4" (local file) or "youtube"
  # (RTMP stream). One recording per room at a time. Host = admin for v1.
  ext-rec:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: ext-rec
    depends_on:
      nats:
        condition: service_started
      worldsim:
        condition: service_started
      livekit:
        condition: service_started
      livekit-egress:
        condition: service_started
      recordings-init:
        condition: service_completed_successfully
    environment:
      NATS_URL: "nats://nats:4222"
      EXTENSION_ID: "rec"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
      LIVEKIT_URL: "ws://livekit:7880"
      LIVEKIT_API_KEY: "devkey"
      LIVEKIT_API_SECRET: "devsecretdevsecretdevsecretdevsecret123"
      RECORDINGS_DIR: "/recordings"
      PUBLIC_HOST: "${PUBLIC_HOST:-localhost}"
      # YouTube RTMP target — leave empty to disable YouTube streaming (MP4
      # still works). Set in .env to enable.
      YOUTUBE_RTMP_URL: "${YOUTUBE_RTMP_URL:-}"
      YOUTUBE_STREAM_KEY: "${YOUTUBE_STREAM_KEY:-}"
    volumes:
      - recordings:/recordings
    restart: unless-stopped

  # OpenObserve (OTel backend) is not included in the stack by default.
  # It requires AES-NI CPU instructions (not available on older Xeons like
  # the L3426). To add it on a compatible CPU, see the FAQ entry
  # "OpenObserve keeps restarting" and the audit-observability design doc.
  # For local dev tracing, use `make debug` (motel TUI) instead.

  # Audit service — subscribes to "audit.event" on NATS, persists to its own
  # SQLite database, and serves a Go templates + HTMX web UI at :8082.
  # Independent of worldsim/PocketBase — survives worldsim crashes.
  audit:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: audit
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      AUDIT_DB: "/data/audit.db"
      AUDIT_HTTP_ADDR: ":8082"
      AUDIT_BASE_PATH: "/audit"
      PUSHER_HEALTHZ: "http://pusher:8081/healthz"
      OTEL_BASE_URL: "http://localhost:5080"
      # GeoIP MMDB for country flag lookups. Baked into the Docker image at
      # /opt/geoip/ip-to-country.mmdb — no volume mount needed. To override
      # with a fresher DB, mount a file here and set GEOIP_DB to its path.
      GEOIP_DB: "/opt/geoip/ip-to-country.mmdb"
    volumes:
      - audit_data:/data
    ports:
      - "8082:8082"
    restart: unless-stopped

  # Admin portal — email/password login via PocketBase, signed cookie
  # session, auth_request endpoint for nginx. Protects PB admin and audit UI.
  admin:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: admin
    depends_on:
      - worldsim
    environment:
      ADMIN_HTTP_ADDR: ":8083"
      ADMIN_SESSION_SECRET: "${ADMIN_SESSION_SECRET:-changeme}"
      PB_API_URL: "http://worldsim:8090/api"
      PB_ADMIN_EMAIL: "admin@pixeleruv.local"
      PB_ADMIN_PASSWORD: "password123"
      RECORDINGS_DIR: "/recordings"
    volumes:
      # Read-write access to recordings for file deletion from the management UI.
      - recordings:/recordings
    restart: unless-stopped

volumes:
  pb_data:
  audit_data:
  recordings:
