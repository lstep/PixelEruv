name: pixeleruv

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped

  pocketbase:
    build:
      context: ..
      dockerfile: docker/pocketbase.Dockerfile
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    restart: unless-stopped

  dex:
    image: ghcr.io/dexidp/dex:latest
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro
      - dex_data:/var/dex
    restart: unless-stopped

  pusher:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: pusher
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      WS_ADDR: ":8081"
      DEX_URL: "http://dex:5556/dex"
      DEX_CLIENT_ID: "pixeleruv"
      # OpenTelemetry — off by default. Set OTEL_ENABLED=true and point
      # OTEL_EXPORTER_OTLP_ENDPOINT at a reachable collector to enable.
      # In docker, 127.0.0.1 refers to the container, so use host.docker.internal
      # (or a motel service) when debugging from the host.
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://127.0.0.1:27686"
    ports:
      - "8081:8081"
    restart: unless-stopped

  worldsim:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: worldsim
    depends_on:
      - nats
      - pocketbase
    environment:
      NATS_URL: "nats://nats:4222"
      TICK_HZ: "20"
      MAP_ID: "test-map"
      POCKETBASE_URL: "http://pocketbase:8090"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://127.0.0.1:27686"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - pusher
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  pb_data:
  dex_data:
