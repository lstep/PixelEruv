# Self-contained compose for the dist/ directory.
# Uses pre-built binaries from dist/bin/ and pre-built web assets from dist/web/.
# Run from dist/:  docker compose up --build
name: pixeleruv

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped

  # MailHog — dev SMTP server for email verification.
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  pusher:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BINARY: pusher
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      WS_ADDR: ":8081"
      PB_API_URL: "http://worldsim:8090/api"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
    ports:
      - "8081:8081"
    restart: unless-stopped

  worldsim:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BINARY: worldsim
    depends_on:
      - nats
      - mailhog
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - pb_data:/pb_data
    environment:
      NATS_URL: "nats://nats:4222"
      TICK_HZ: "20"
      PB_DATA_DIR: "/pb_data"
      PB_HTTP_ADDR: "0.0.0.0:8090"
      PB_ADMIN_EMAIL: "admin@pixeleruv.local"
      PB_ADMIN_PASSWORD: "password123"
      # SMTP, APP_URL, and YouTube RTMP defaults are now configured at runtime
      # via Admin > World Options (NATS KV bucket "world_options").
      PUBLIC_HOST: "${PUBLIC_HOST:-localhost}"
      OAUTH2_GOOGLE_CLIENT_ID: "${OAUTH2_GOOGLE_CLIENT_ID:-}"
      OAUTH2_GOOGLE_SECRET: "${OAUTH2_GOOGLE_SECRET:-}"
      OAUTH2_GITHUB_CLIENT_ID: "${OAUTH2_GITHUB_CLIENT_ID:-}"
      OAUTH2_GITHUB_SECRET: "${OAUTH2_GITHUB_SECRET:-}"
      OAUTH2_FACEBOOK_CLIENT_ID: "${OAUTH2_FACEBOOK_CLIENT_ID:-}"
      OAUTH2_FACEBOOK_SECRET: "${OAUTH2_FACEBOOK_SECRET:-}"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - pusher
      - worldsim
      - audit
      - admin
    ports:
      - "4080:80"
      - "4043:443"
    environment:
      TLS_HOSTS: "localhost,127.0.0.1"
      PUBLIC_HOST: "${PUBLIC_HOST:-localhost}"
    volumes:
      # Read-only access to recordings for download via /recordings/ (admin-auth).
      - ./recordings:/var/www/recordings:ro
    restart: unless-stopped

  ext-demo:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BINARY: ext-demo
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      EXTENSION_ID: "demo"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
    restart: unless-stopped

  ext-walls:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BINARY: ext-walls
    depends_on:
      - nats
      - worldsim
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
    restart: unless-stopped

  ext-props:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BINARY: ext-props
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
    restart: unless-stopped

  # LiveKit SFU server for A/V. API keys must match ext-av.
  # use_external_ip: true in livekit.yaml auto-discovers the public IP via
  # STUN. For remote access, ensure UDP 50000-50020 are open on the firewall.
  livekit:
    image: livekit/livekit-server:v1.13.2
    command: ["--config", "/etc/livekit.yaml", "--node-ip", "${LIVEKIT_NODE_IP:-127.0.0.1}"]
    depends_on:
      - redis
    ports:
      - "7880:7880"   # WebSocket signaling
      - "7881:7881"   # TCP (fallback)
      - "50000-50020:50000-50020/udp" # WebRTC ICE range
    volumes:
      - ./docker/livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  # Redis — message bus for LiveKit psrpc (Egress RPC forwarding).
  # No host port mapping: containers reach it via the docker network at
  # redis:6379. The host often runs its own redis on 127.0.0.1:6379.
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  ext-av:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BINARY: ext-av
    depends_on:
      - nats
      - worldsim
      - livekit
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
      LIVEKIT_URL: "ws://livekit:7880"
      LIVEKIT_PUBLIC_URL: "${LIVEKIT_PUBLIC_URL:-ws://${PUBLIC_HOST:-localhost}:7880}"
      LIVEKIT_API_KEY: "devkey"
      LIVEKIT_API_SECRET: "devsecretdevsecretdevsecretdevsecret123"
    restart: unless-stopped

  # LiveKit Egress service — records room composites to file (MP4) or streams
  # to RTMP (YouTube). ext-rec calls its API via the LiveKit server-sdk-go;
  # the SDK posts to the LiveKit server, which forwards to Egress via psrpc
  # over Redis. The egress container runs as uid 1001 (gid 0); the
  # recordings-init service chowns the shared volume on startup so egress
  # can write MP4 files and ext-rec can read them.
  recordings-init:
    image: alpine:3.20
    command: ["chown", "-R", "1001:0", "/recordings"]
    volumes:
      - ./recordings:/recordings
    restart: "no"

  livekit-egress:
    image: livekit/egress:v1.9.0
    depends_on:
      recordings-init:
        condition: service_completed_successfully
      livekit:
        condition: service_started
      redis:
        condition: service_started
    environment:
      EGRESS_CONFIG_FILE: "/etc/egress.yaml"
    volumes:
      - ./docker/egress.yaml:/etc/egress.yaml:ro
      - ./recordings:/recordings
    restart: unless-stopped

  # ext-rec — recording extension. Admin-hosted start/stop of Room Composite
  # Egress for zone A/V rooms. Two targets: "mp4" (local file) or "youtube"
  # (RTMP stream). One recording per room at a time. Host = admin for v1.
  ext-rec:
    build:
      context: .
      dockerfile: docker/backend-rec.Dockerfile
      args:
        BINARY: ext-rec
    depends_on:
      nats:
        condition: service_started
      worldsim:
        condition: service_started
      livekit:
        condition: service_started
      livekit-egress:
        condition: service_started
      recordings-init:
        condition: service_completed_successfully
    environment:
      NATS_URL: "nats://nats:4222"
      EXTENSION_ID: "rec"
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openobserve:5080/api/default"
      LIVEKIT_URL: "ws://livekit:7880"
      LIVEKIT_API_KEY: "devkey"
      LIVEKIT_API_SECRET: "devsecretdevsecretdevsecretdevsecret123"
      RECORDINGS_DIR: "/recordings"
      # YouTube RTMP defaults + ffmpeg limits come from world_options now.
      PUBLIC_HOST: "${PUBLIC_HOST:-localhost}"
    volumes:
      - ./recordings:/recordings
    restart: unless-stopped

  # OpenObserve (OTel backend) is not included by default — it requires
  # AES-NI CPU instructions. See the FAQ and audit-observability design doc.
  # For local dev tracing, use `make debug` (motel TUI).

  # Audit service — subscribes to "audit.event" on NATS, persists to its
  # own SQLite database, serves a Go templates + HTMX web UI at :8082.
  audit:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BINARY: audit
    depends_on:
      - nats
    environment:
      NATS_URL: "nats://nats:4222"
      AUDIT_DB: "/data/audit.db"
      AUDIT_HTTP_ADDR: ":8082"
      AUDIT_BASE_PATH: "/audit"
      PUSHER_HEALTHZ: "http://pusher:8081/healthz"
      OTEL_BASE_URL: "http://localhost:5080"
      # GeoIP MMDB for country flag lookups. Baked into the Docker image at
      # /opt/geoip/ip-to-country.mmdb — no volume mount needed. To override
      # with a fresher DB, mount a file here and set GEOIP_DB to its path.
      GEOIP_DB: "/opt/geoip/ip-to-country.mmdb"
    volumes:
      - audit_data:/data
    ports:
      - "8082:8082"
    restart: unless-stopped

  # MCP (Model Context Protocol) server — exposes PixelEruv internals to MCP
  # clients (Claude Desktop, Devin, Cursor, etc.) over HTTP/SSE on :8085/mcp.
  # Connects to NATS for worldsim request-reply + audit.event live
  # subscription, the audit HTTP API for historical queries, and PocketBase
  # REST for record reads. Requires MCP_AUTH_TOKEN — refuses to start without
  # it. Bearer-token auth on /mcp; /healthz is unauthenticated.
  mcp:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BINARY: mcp
    depends_on:
      - nats
      - audit
      - worldsim
      - docker-proxy
    environment:
      NATS_URL: "nats://nats:4222"
      MCP_HTTP_ADDR: ":8085"
      MCP_AUTH_TOKEN: "${MCP_AUTH_TOKEN:?MCP_AUTH_TOKEN is required}"
      MCP_ACTOR: "mcp"
      AUDIT_BASE_URL: "http://audit:8082/audit"
      AUDIT_AUTH_USER: "${AUDIT_AUTH_USER:-}"
      AUDIT_AUTH_PASS: "${AUDIT_AUTH_PASS:-}"
      PB_BASE_URL: "http://worldsim:8090"
      PB_ADMIN_TOKEN: "${PB_ADMIN_TOKEN:-}"
      # Read-only HTTP endpoint in front of the host docker socket (same
      # docker-proxy the admin service uses). Allowlist: GET /containers/json
      # + GET /info. If unset, docker tools return an error.
      DOCKER_PROXY_URL: "http://docker-proxy:2375"
    ports:
      - "8085:8085"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BINARY: admin
    depends_on:
      - worldsim
      - docker-proxy
    environment:
      ADMIN_HTTP_ADDR: ":8083"
      ADMIN_SESSION_SECRET: "${ADMIN_SESSION_SECRET:-changeme}"
      PB_API_URL: "http://worldsim:8090/api"
      PB_ADMIN_EMAIL: "admin@pixeleruv.local"
      PB_ADMIN_PASSWORD: "password123"
      RECORDINGS_DIR: "/recordings"
      NATS_URL: "nats://nats:4222"
      # Read-only HTTP endpoint in front of the host docker socket. The
      # admin container never mounts /var/run/docker.sock directly — that
      # would be root-equivalent on the host. docker-proxy allowlists
      # GET /containers/json and GET /info; everything else 403s.
      DOCKER_PROXY_URL: "http://docker-proxy:2375"
    volumes:
      # Read-write access to recordings for file deletion from the management UI.
      - ./recordings:/recordings
    restart: unless-stopped

  # docker-readonly-proxy — minimal filtering proxy in front of the host
  # Docker engine socket. Mounts /var/run/docker.sock read-only. Allowlist:
  #   GET /containers/json
  #   GET /info
  # Anything else returns 403. No host port published — only containers on
  # this docker network can reach it. The admin service uses it for the
  # /admin/docker status page; admin itself never sees the socket.
  docker-proxy:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        BINARY: docker-readonly-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  pb_data:
  audit_data:
