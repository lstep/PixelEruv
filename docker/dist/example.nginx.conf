# Example host nginx config for a public deployment.
#
# Copy this file to /etc/nginx/sites-available/pixeleruv.conf, edit the
# placeholders below, symlink it into sites-enabled, then reload nginx:
#
#   sudo cp example.nginx.conf /etc/nginx/sites-available/pixeleruv.conf
#   sudo ln -s /etc/nginx/sites-available/pixeleruv.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Placeholders to replace:
#   - pixeleruv.example.org  -> your domain
#   - /etc/nginx/ssl/...     -> your TLS cert and key paths
#
# This config terminates TLS and forwards everything to the in-container
# nginx on localhost:4080, which already proxies:
#   /ws       -> pusher (game WebSocket)
#   /livekit/ -> livekit SFU (A/V signaling, TLS-terminated here)
#   /dex/     -> dex (OIDC)
#   /api/     -> worldsim (PocketBase API, embedded in worldsim)
# So only port 4080 needs to be reachable on localhost; you do NOT need to
# expose 7880, 5556, or 8090 to the public internet.
#
# Required compose env for A/V over HTTPS:
#   PUBLIC_HOST=pixeleruv.example.org
#   LIVEKIT_PUBLIC_URL=ws://pixeleruv.example.org/livekit
# The browser auto-upgrades ws:// to wss:// on HTTPS pages, so the LiveKit
# SDK connects to wss://pixeleruv.example.org/livekit/rtc/v1 — same origin,
# no mixed-content block.
#
# WebRTC media (UDP 50000-50020) still needs to reach the LiveKit container
# directly from the browser. Open that UDP range in your firewall, or run a
# TURN server. Signaling over wss:// is not enough for full A/V by itself.

# WebSocket upgrade map (used by the / location below).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name pixeleruv.example.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;

    server_name pixeleruv.example.org;
    root /var/www/blank;

    # TLS — replace with your real cert/key paths.
    ssl_certificate     /etc/nginx/ssl/example.org.crt;
    ssl_certificate_key /etc/nginx/ssl/example.org.key;

    access_log /var/log/nginx/pixeleruv.access.log;
    error_log  /var/log/nginx/pixeleruv.error.log warn;

    # Reverse proxy to the in-container nginx (HTTP). It handles /ws, /livekit/,
    # /dex/, and /api/ internally, so a single catch-all location is enough.
    location / {
        proxy_pass http://localhost:4080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming-friendly: no buffering, no chunked, unlimited body size
        # (needed for WebSocket, LiveKit signaling, and map uploads).
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    client_max_body_size 0;

    location /robots.txt { return 200 "User-agent: *\nDisallow: /"; }
}
