# LiveKit server config for local dev.
# API keys must match ext-av's LIVEKIT_API_KEY/LIVEKIT_API_SECRET env vars.
#
# Schema reference: github.com/livekit/livekit config-sample.yaml
#   - `port` is the WebSocket signaling port.
#   - `rtc.tcp_port` enables WebRTC-over-TCP fallback (under rtc:, not top-level).
#   - `rtc.port_range_start/end` is the UDP media port range.
#   - top-level `tcp_port`/`udp_port` were removed in newer versions; keeping
#     them at the top level makes livekit-server refuse to start.
port: 7880

# Dev API keys (DO NOT use in production).
keys:
  devkey: devsecretdevsecretdevsecretdevsecret123

# Bind to all interfaces so the browser can reach it from the host.
bind_addresses:
  - "0.0.0.0"

# WebRTC ICE port range (must match docker-compose port mapping).
# For remote access, ensure UDP 50000-50020 are open on the host firewall.
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50020
  # use_external_ip: true makes LiveKit discover its public IP via STUN and
  # advertise it in ICE candidates, so remote browsers can reach the WebRTC
  # media ports. enable_loopback_candidate (below) keeps same-machine dev
  # working by also advertising 127.0.0.1 as a candidate. The --node-ip flag
  # in docker-compose is used as a fallback if STUN discovery fails.
  use_external_ip: true
  # Allow 127.0.0.1 candidates so same-machine dev works alongside
  # the STUN-discovered public IP candidate.
  enable_loopback_candidate: true

# use_external_ip: true uses LiveKit's built-in STUN servers (Google public
# STUN by default) to discover the external IP. No explicit STUN config needed.
