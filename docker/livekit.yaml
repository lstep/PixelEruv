# LiveKit server config for local dev.
# API keys must match ext-av's LIVEKIT_API_KEY/LIVEKIT_API_SECRET env vars.
#
# Schema reference: github.com/livekit/livekit config-sample.yaml
#   - `port` is the WebSocket signaling port.
#   - `rtc.tcp_port` enables WebRTC-over-TCP fallback (under rtc:, not top-level).
#   - `rtc.port_range_start/end` is the UDP media port range.
#   - top-level `tcp_port`/`udp_port` were removed in newer versions; keeping
#     them at the top level makes livekit-server refuse to start.
port: 7880

# Dev API keys (DO NOT use in production).
keys:
  devkey: secret

# Bind to all interfaces so the browser can reach it from the host.
bind_addresses:
  - "0.0.0.0"

# WebRTC ICE port range (must match docker-compose port mapping).
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50020
  # node_ip is injected via the --node-ip flag in docker-compose (defaults to
  # 127.0.0.1 for same-machine dev). use_external_ip MUST be false, otherwise
  # LiveKit ignores --node-ip and advertises a STUN-discovered public IP that
  # a localhost browser can't route back to (ICE failure).
  use_external_ip: false
  # Allow 127.0.0.1 candidates so same-machine dev works.
  enable_loopback_candidate: true

# No external TURN/STUN for local dev.
