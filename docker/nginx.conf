# HTTP — kept for localhost dev (crypto.subtle works on localhost, no TLS needed).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html must not be cached — it references hashed JS bundles, so a
    # stale cached copy would load old JavaScript after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy to pusher
    location /ws {
        proxy_pass http://pusher:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Health endpoint proxy to pusher
    location /healthz {
        proxy_pass http://pusher:8081/healthz;
        proxy_set_header Host $host;
    }

    # LiveKit signaling proxy (TLS-terminated same-origin). The trailing slash
    # strips the /livekit prefix so the SDK's /rtc/v1 path lands at the root.
    # Set LIVEKIT_PUBLIC_URL=ws://<host>/livekit (upgraded to wss:// on HTTPS).
    location /livekit/ {
        proxy_pass http://livekit:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Dex OIDC proxy (same-origin for browser)
    location /dex/ {
        proxy_pass http://dex:5556/dex/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PocketBase API proxy (same-origin for browser — map fetch, etc.)
    # PB is embedded in worldsim and served on its HTTP port.
    location /api/ {
        proxy_pass http://worldsim:8090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Audit UI proxy (Go templates + HTMX, served by the audit service).
    # Uses runtime DNS resolution (Docker's embedded resolver) so nginx
    # doesn't crash if the audit container is briefly unavailable.
    # The audit service is configured with AUDIT_BASE_PATH=/audit so it
    # serves all routes under that prefix — no rewrite needed.
    location /audit/ {
        resolver 127.0.0.11 valid=30s;
        set $audit_upstream http://audit:8082;
        proxy_pass $audit_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — required for remote access. Browsers only expose crypto.subtle
# (used by the PKCE auth flow) in secure contexts (HTTPS or localhost). The
# self-signed cert is generated at container start by /entrypoint.sh from
# $TLS_HOSTS. Access remotely at https://<host-ip>:4043 and accept the cert
# warning once.
server {
    listen 443 ssl;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # index.html must not be cached — it references hashed JS bundles, so a
    # stale cached copy would load old JavaScript after a redeploy.
    location = /index.html {
