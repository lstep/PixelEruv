# HTTP — kept for localhost dev (crypto.subtle works on localhost, no TLS needed).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy to pusher
    location /ws {
        proxy_pass http://pusher:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Dex OIDC proxy (same-origin for browser)
    location /dex/ {
        proxy_pass http://dex:5556/dex/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PocketBase API proxy (same-origin for browser — map fetch, etc.)
    location /api/ {
        proxy_pass http://pocketbase:8090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — required for remote access. Browsers only expose crypto.subtle
# (used by the PKCE auth flow) in secure contexts (HTTPS or localhost). The
# self-signed cert is generated at container start by /entrypoint.sh from
# $TLS_HOSTS. Access remotely at https://<host-ip>:4043 and accept the cert
# warning once.
server {
    listen 443 ssl;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy to pusher
    location /ws {
        proxy_pass http://pusher:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Dex OIDC proxy (same-origin for browser)
    location /dex/ {
        proxy_pass http://dex:5556/dex/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PocketBase API proxy (same-origin for browser — map fetch, etc.)
    location /api/ {
        proxy_pass http://pocketbase:8090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
