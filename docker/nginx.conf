# HTTP — kept for localhost dev (crypto.subtle works on localhost, no TLS needed).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large uploads (spritesheets, map data) through PB /api/ and /_/.
    # Default is 1MB, which rejects ~2.5MB spritesheets before they reach PB.
    client_max_body_size 0;

    # index.html must not be cached — it references hashed JS bundles, so a
    # stale cached copy would load old JavaScript after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Maintenance page served by error_page when backend proxies return
    # 502/503/504. No-cache so updates to the page take effect immediately.
    # Served from the same root as index.html (frontend/public/maintenance.html
    # is bundled into /usr/share/nginx/html by the Vite build).
    location = /maintenance.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static welcome page (community-customizable).
    location /welcome {
        root /var/www;
        try_files $uri /welcome/index.html =404;
    }

    # WebSocket proxy to pusher. Variable upstream + resolver so nginx
    # re-resolves the pusher container IP every 30s — required because
    # `deploy-remote` recreates pusher with a new IP without restarting
    # the frontend container. A static `proxy_pass http://pusher:8081/ws`
    # would cache the old (dead) IP forever and 502 after every deploy.
    location /ws {
        resolver 127.0.0.11 valid=30s;
        set $pusher_upstream http://pusher:8081;
        proxy_pass $pusher_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Health endpoint proxy to pusher (same re-resolve reason as /ws).
    location /healthz {
        resolver 127.0.0.11 valid=30s;
        set $pusher_upstream http://pusher:8081;
        proxy_pass $pusher_upstream;
        proxy_set_header Host $host;
    }

    # LiveKit signaling proxy (TLS-terminated same-origin). The rewrite
    # strips the /livekit prefix so the SDK's /rtc/v1 path lands at the
    # root. Set LIVEKIT_PUBLIC_URL=ws://<host>/livekit (upgraded to wss://
    # on HTTPS). Variable upstream + resolver for the same re-resolve
    # reason as /ws.
    location /livekit/ {
        resolver 127.0.0.11 valid=30s;
        set $livekit_upstream http://livekit:7880;
        rewrite ^/livekit/(.*)$ /$1 break;
        proxy_pass $livekit_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # PocketBase API proxy (same-origin for browser — map fetch, auth, etc.)
    # PB is embedded in worldsim and served on its HTTP port. Variable
    # upstream + resolver so nginx re-resolves worldsim after a deploy.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $worldsim_upstream http://worldsim:8090;
        proxy_pass $worldsim_upstream;
        error_page 502 503 504 /maintenance.html;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin portal service (email/password login, landing page, auth_request endpoint).
    location /admin/ {
        resolver 127.0.0.11 valid=30s;
        set $admin_upstream http://admin:8083;
        proxy_pass $admin_upstream;
        error_page 502 503 504 /maintenance.html;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
    }

    # PocketBase admin UI (/_/) — proxied and protected by admin auth_request.
    location /_/ {
        resolver 127.0.0.11 valid=30s;
        set $worldsim_upstream http://worldsim:8090;
        auth_request /admin/auth-check;
        error_page 401 = @admin_redirect;
        error_page 502 503 504 /maintenance.html;
        proxy_pass $worldsim_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Audit UI proxy — protected by admin auth_request.
    # The audit service is configured with AUDIT_BASE_PATH=/audit so it
    # serves all routes under that prefix — no rewrite needed.
    location /audit/ {
        resolver 127.0.0.11 valid=30s;
        set $audit_upstream http://audit:8082;
        auth_request /admin/auth-check;
        error_page 401 = @admin_redirect;
        error_page 502 503 504 /maintenance.html;
        proxy_pass $audit_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP (Model Context Protocol) server — HTTP/SSE endpoint for MCP clients
    # (Claude Desktop, Devin, Cursor, etc.). Auth is bearer-token at the app
    # layer (MCP_AUTH_TOKEN), NOT the admin cookie auth_request. proxy_buffering
    # off + long read timeout are required for SSE.
    location /mcp {
        resolver 127.0.0.11 valid=30s;
        set $mcp_upstream http://mcp:8085;
        proxy_pass $mcp_upstream;
        error_page 502 503 504 /maintenance.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Recording downloads — MP4 files served from the bind-mounted recordings
    # directory. Protected by admin auth_request so only authenticated admins
    # can download recordings. ext-rec populates file_url in the PB row as
    # https://<PUBLIC_HOST>/recordings/<filename>.
    location /recordings/ {
        auth_request /admin/auth-check;
        error_page 401 = @admin_redirect;
        alias /var/www/recordings/;
        autoindex on;
        types {
            video/mp4 mp4;
            audio/mpeg mp3;
            image/jpeg jpg jpeg;
            application/json json;
        }
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
    }

    # Internal redirect for failed auth_request — send to login.
    location @admin_redirect {
        return 302 /admin/login;
    }
}

# HTTPS — required for remote access. Browsers only expose crypto.subtle
# (used by the PKCE auth flow) in secure contexts (HTTPS or localhost). The
# self-signed cert is generated at container start by /entrypoint.sh from
# $TLS_HOSTS. Access remotely at https://<host-ip>:4043 and accept the cert
# warning once.
server {
    listen 443 ssl;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Allow large uploads (spritesheets, map data) through PB /api/ and /_/.
