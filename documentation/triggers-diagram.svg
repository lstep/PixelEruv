<svg width="100%" viewBox="0 0 980 760" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">
  <title>Pixel Eruv — Trigger System</title>
  <desc>Two trigger types: Zone Triggers (gate mode: block/allow/ask, gates movement; notify mode: enter/exit/proximity, fire-and-forget) and Input Triggers (player-initiated, broadcast to all registered extensions with range/LOS data). Each column shows what the kernel evaluates and what the extension handles, plus NATS round-trip and crash behavior.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="980" height="760" fill="#fafaf9"/>

  <!-- Title -->
  <text x="490" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Trigger System</text>
  <text x="490" y="46" text-anchor="middle" font-size="13" fill="#64748b">Two types · kernel evaluates · extensions decide behavior</text>

  <!-- ============================================ -->
  <!-- Row labels (left margin) -->
  <!-- ============================================ -->
  <text x="15" y="100" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.05em">TYPE</text>
  <text x="15" y="240" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.05em">KERNEL</text>
  <text x="15" y="470" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.05em">EXTENSION</text>

  <!-- ============================================ -->
  <!-- Column 1: ZONE GATE (red/risk) -->
  <!-- ============================================ -->

  <!-- Type header -->
  <rect x="100" y="62" width="260" height="80" rx="8" fill="#fecaca" stroke="#475569" stroke-width="1"/>
  <text x="230" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Zone Trigger · Gate</text>
  <text x="230" y="98" text-anchor="middle" font-size="12" fill="#64748b">Gate movement · on move attempt</text>
  <text x="230" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">block · allow · ask</text>
  <text x="230" y="134" text-anchor="middle" font-size="12" fill="#64748b">shape: polygon / circle / rect</text>

  <!-- Kernel box -->
  <rect x="100" y="200" width="260" height="210" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
  <text x="230" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Kernel evaluates</text>
  <line x1="115" y1="228" x2="345" y2="228" stroke="#475569" stroke-width="0.5" opacity="0.4"/>
  <text x="115" y="245" font-size="12" font-weight="600" fill="#0f172a">block</text>
  <text x="115" y="260" font-size="12" fill="#64748b">Cache in spatial index</text>
  <text x="115" y="274" font-size="12" fill="#64748b">Refuse move locally</text>
  <text x="115" y="288" font-size="12" fill="#64748b">No NATS round-trip</text>
  <line x1="115" y1="298" x2="345" y2="298" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
  <text x="115" y="313" font-size="12" font-weight="600" fill="#0f172a">allow</text>
  <text x="115" y="328" font-size="12" fill="#64748b">Cache in spatial index</text>
  <text x="115" y="342" font-size="12" fill="#64748b">Permit move locally</text>
  <text x="115" y="356" font-size="12" fill="#64748b">No NATS round-trip</text>
  <line x1="115" y1="366" x2="345" y2="366" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
  <text x="115" y="381" font-size="12" font-weight="600" fill="#0f172a">ask</text>
  <text x="115" y="396" font-size="12" fill="#64748b">Publish query to extension</text>
  <text x="115" y="410" font-size="12" fill="#64748b">Defer move · wait for reply</text>

  <!-- Extension box -->
  <rect x="100" y="450" width="260" height="130" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
  <text x="230" y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Extension handles</text>
  <line x1="115" y1="478" x2="345" y2="478" stroke="#475569" stroke-width="0.5" opacity="0.4"/>
  <text x="115" y="495" font-size="12" font-weight="600" fill="#0f172a">block / allow</text>
  <text x="115" y="510" font-size="12" fill="#64748b">Not contacted — pre-declared</text>
  <text x="115" y="524" font-size="12" fill="#64748b">at registration time</text>
  <line x1="115" y1="534" x2="345" y2="534" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
  <text x="115" y="549" font-size="12" font-weight="600" fill="#0f172a">ask</text>
  <text x="115" y="564" font-size="12" fill="#64748b">Reply: allow or block</text>
  <text x="115" y="578" font-size="12" fill="#64748b">(within ttl_ms, else fail closed)</text>

  <!-- Arrows: col 1 -->
  <line x1="230" y1="142" x2="230" y2="196" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="230" y1="410" x2="230" y2="446" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- Column 2: ZONE NOTIFY (teal/storage) -->
  <!-- ============================================ -->

  <!-- Type header -->
  <rect x="390" y="62" width="260" height="80" rx="8" fill="#99f6e4" stroke="#475569" stroke-width="1"/>
  <text x="520" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Zone Trigger · Notify</text>
  <text x="520" y="98" text-anchor="middle" font-size="12" fill="#64748b">Notifications · fire-and-forget</text>
  <text x="520" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">static zone · mobile circle</text>
  <text x="520" y="134" text-anchor="middle" font-size="12" fill="#64748b">events: enter / exit / proximity_*</text>

  <!-- Kernel box -->
  <rect x="390" y="200" width="260" height="210" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
  <text x="520" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Kernel dispatches</text>
  <line x1="405" y1="228" x2="635" y2="228" stroke="#475569" stroke-width="0.5" opacity="0.4"/>
  <text x="405" y="245" font-size="12" font-weight="600" fill="#0f172a">static zone</text>
  <text x="405" y="260" font-size="12" fill="#64748b">On zone boundary crossing</text>
  <text x="405" y="274" font-size="12" fill="#64748b">Point-to-point to owner</text>
  <text x="405" y="288" font-size="12" fill="#64748b">(pre-rasterized tile set)</text>
  <line x1="405" y1="298" x2="635" y2="298" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
  <text x="405" y="313" font-size="12" font-weight="600" fill="#0f172a">mobile circle</text>
  <text x="405" y="328" font-size="12" fill="#64748b">Per-tick: distance check</text>
  <text x="405" y="342" font-size="12" fill="#64748b">around followed entity</text>
  <text x="405" y="356" font-size="12" fill="#64748b">(radius N tiles)</text>
  <line x1="405" y1="366" x2="635" y2="366" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
  <text x="405" y="381" font-size="12" fill="#64748b">Block-wins for overlapping</text>
  <text x="405" y="396" font-size="12" fill="#64748b">gate zones (ADR 0001)</text>

  <!-- Extension box -->
  <rect x="390" y="450" width="260" height="130" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
  <text x="520" y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Extension handles</text>
  <line x1="405" y1="478" x2="635" y2="478" stroke="#475569" stroke-width="0.5" opacity="0.4"/>
  <text x="405" y="495" font-size="12" font-weight="600" fill="#0f172a">Both modes</text>
  <text x="405" y="510" font-size="12" fill="#64748b">Receive notification</text>
  <text x="405" y="524" font-size="12" fill="#64748b">No reply expected</text>
  <text x="405" y="538" font-size="12" fill="#64748b">(fire-and-forget)</text>
  <line x1="405" y1="548" x2="635" y2="548" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
  <text x="405" y="563" font-size="12" fill="#64748b">Derive occupancy from enter/exit</text>
  <text x="405" y="577" font-size="12" fill="#64748b">Filter proximity by direction (optional)</text>

  <!-- Arrows: col 2 -->
  <line x1="520" y1="142" x2="520" y2="196" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="520" y1="410" x2="520" y2="446" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- Column 3: INPUT TRIGGER (blue/input) -->
  <!-- ============================================ -->

  <!-- Type header -->
  <rect x="680" y="62" width="260" height="80" rx="8" fill="#bfdbfe" stroke="#475569" stroke-width="1"/>
  <text x="810" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Input Trigger</text>
  <text x="810" y="98" text-anchor="middle" font-size="12" fill="#64748b">Player-initiated · broadcast to all registered</text>
  <text x="810" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">click:left · click:right · key:E · …</text>
  <text x="810" y="134" text-anchor="middle" font-size="12" fill="#64748b">via ActionFrame</text>

  <!-- Kernel box -->
  <rect x="680" y="200" width="260" height="210" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
  <text x="810" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Kernel dispatches</text>
  <line x1="695" y1="228" x2="925" y2="228" stroke="#475569" stroke-width="0.5" opacity="0.4"/>
  <text x="695" y="245" font-size="12" font-weight="600" fill="#0f172a">Compute contextual data</text>
  <text x="695" y="260" font-size="12" fill="#64748b">clicks: target_tile, entities,</text>
  <text x="695" y="274" font-size="12" fill="#64748b">range, has_los (Bresenham)</text>
  <text x="695" y="288" font-size="12" fill="#64748b">keys: adjacent_entities</text>
  <line x1="695" y1="298" x2="925" y2="298" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
  <text x="695" y="313" font-size="12" font-weight="600" fill="#0f172a">Broadcast to all registered</text>
  <text x="695" y="328" font-size="12" fill="#64748b">+ equipment snapshot</text>
  <text x="695" y="342" font-size="12" fill="#64748b">No gating — data provider</text>
  <line x1="695" y1="352" x2="925" y2="352" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
  <text x="695" y="367" font-size="12" font-weight="600" fill="#0f172a">Collect replies (timeout)</text>
  <text x="695" y="382" font-size="12" fill="#64748b">Apply all · no conflict resolution</text>
  <text x="695" y="396" font-size="12" fill="#64748b">Single ActionResultFrame</text>

  <!-- Extension box -->
  <rect x="680" y="450" width="260" height="130" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
  <text x="810" y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Extension handles</text>
  <line x1="695" y1="478" x2="925" y2="478" stroke="#475569" stroke-width="0.5" opacity="0.4"/>
  <text x="695" y="495" font-size="12" font-weight="600" fill="#0f172a">Self-filter</text>
  <text x="695" y="510" font-size="12" fill="#64748b">Check entities_on_tile, range,</text>
  <text x="695" y="524" font-size="12" fill="#64748b">has_los, equipment — decide</text>
  <text x="695" y="538" font-size="12" fill="#64748b">whether to act</text>
  <line x1="695" y1="548" x2="925" y2="548" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
  <text x="695" y="563" font-size="12" font-weight="600" fill="#0f172a">Reply</text>
  <text x="695" y="578" font-size="12" fill="#64748b">updates + consume_items</text>

  <!-- Arrows: col 3 -->
  <line x1="810" y1="142" x2="810" y2="196" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="810" y1="410" x2="810" y2="446" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- Crash behavior (bottom) -->
  <!-- ============================================ -->
  <rect x="40" y="610" width="900" height="130" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="0.5"/>
  <text x="60" y="632" font-size="13" font-weight="700" fill="#0f172a">On extension crash</text>
  <line x1="60" y1="640" x2="920" y2="640" stroke="#475569" stroke-width="0.5" opacity="0.3"/>

  <text x="60" y="660" font-size="12" font-weight="600" fill="#0f172a">Zone Gate:</text>
  <text x="160" y="660" font-size="12" fill="#64748b">block/allow stay cached · ask times out → fail closed (block)</text>

  <text x="60" y="682" font-size="12" font-weight="600" fill="#0f172a">Zone Notify:</text>
  <text x="160" y="682" font-size="12" fill="#64748b">silently dropped (no listener) · proximity evaluation stops for crashed owner</text>

  <text x="60" y="704" font-size="12" font-weight="600" fill="#0f172a">Input Trigger:</text>
  <text x="160" y="704" font-size="12" fill="#64748b">removed from input registry · if no other handler → "no_handler" error</text>

  <text x="60" y="726" font-size="11" font-style="italic" fill="#94a3b8">See CONTEXT.md for the canonical glossary · ADR 0001 for block-wins gate resolution</text>
</svg>
