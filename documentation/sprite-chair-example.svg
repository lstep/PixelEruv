<svg width="100%" viewBox="0 0 1100 720" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">
  <title>Chair example — player in front vs behind, by feet Y</title>
  <desc>Three side-by-side scenes showing the same 32x64 chair (base at row 6, baseY=192) and a player at three different tile rows. When the player's feetY is greater than the chair's baseY, the player draws in front. When feetY is less than baseY, the player draws behind. The depth numbers and the visible result are shown for each case.</desc>

  <rect width="1100" height="720" fill="#fafaf9"/>

  <text x="550" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Chair example — one 32×64 sprite, three player positions</text>
  <text x="550" y="56" text-anchor="middle" font-size="13" fill="#64748b">Chair base at row 6 (baseY = 192). Player depth is recomputed every frame from feetY. Compare feetY to 192 to know who is in front.</text>

  <!-- ===================== Case A: player below (row 7) ===================== -->
  <g>
    <rect x="40" y="90" width="330" height="600" rx="10" fill="#fff" stroke="#cbd5e1"/>
    <text x="205" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">A. Player below (row 7)</text>

    <!-- tile grid 4 cols x 8 rows, 32px each, scaled 2x = 64px -->
    <g transform="translate(60,140)">
      <!-- grid lines -->
      <g stroke="#e2e8f0" stroke-width="1">
        <line x1="0"   y1="0"   x2="0"   y2="512"/>
        <line x1="64"  y1="0"   x2="64"  y2="512"/>
        <line x1="128" y1="0"   x2="128" y2="512"/>
        <line x1="192" y1="0"   x2="192" y2="512"/>
        <line x1="256" y1="0"   x2="256" y2="512"/>
        <line x1="0" y1="0"   x2="256" y2="0"/>
        <line x1="0" y1="64"  x2="256" y2="64"/>
        <line x1="0" y1="128" x2="256" y2="128"/>
        <line x1="0" y1="192" x2="256" y2="192"/>
        <line x1="0" y1="256" x2="256" y2="256"/>
        <line x1="0" y1="320" x2="256" y2="320"/>
        <line x1="0" y1="384" x2="256" y2="384"/>
        <line x1="0" y1="448" x2="256" y2="448"/>
        <line x1="0" y1="512" x2="256" y2="512"/>
      </g>
      <!-- row labels -->
      <text x="-8" y="32"  text-anchor="end" font-size="10" fill="#94a3b8">r3</text>
      <text x="-8" y="96"  text-anchor="end" font-size="10" fill="#94a3b8">r4</text>
      <text x="-8" y="160" text-anchor="end" font-size="10" fill="#94a3b8">r5</text>
      <text x="-8" y="224" text-anchor="end" font-size="10" fill="#94a3b8">r6</text>
      <text x="-8" y="288" text-anchor="end" font-size="10" fill="#94a3b8">r7</text>

      <!-- Chair: 32x64 sprite, base at row 6 bottom (y=256 in this 2x grid), spans rows 5-6 -->
      <rect x="96" y="128" width="64" height="128" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
      <text x="128" y="200" text-anchor="middle" font-size="14" fill="#7c2d12" font-weight="700">chair</text>
      <!-- chair base line -->
      <line x1="80" y1="256" x2="176" y2="256" stroke="#b45309" stroke-width="2"/>
      <text x="180" y="252" font-size="10" fill="#b45309">baseY=192</text>

      <!-- Player at row 7, feet at y=320 (2x grid) -->
      <rect x="160" y="224" width="64" height="128" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text x="192" y="296" text-anchor="middle" font-size="28">🧍</text>
      <line x1="144" y1="320" x2="240" y2="320" stroke="#1d4ed8" stroke-width="2"/>
      <text x="244" y="316" font-size="10" fill="#1d4ed8">feetY=224</text>
    </g>

    <rect x="60" y="660" width="290" height="22" rx="4" fill="#dcfce7"/>
    <text x="205" y="676" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">feetY 224 &gt; baseY 192 → player IN FRONT</text>
  </g>

  <!-- ===================== Case B: player above (row 5) ===================== -->
  <g>
    <rect x="385" y="90" width="330" height="600" rx="10" fill="#fff" stroke="#cbd5e1"/>
    <text x="550" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">B. Player above (row 5)</text>

    <g transform="translate(405,140)">
      <g stroke="#e2e8f0" stroke-width="1">
        <line x1="0"   y1="0"   x2="0"   y2="512"/>
        <line x1="64"  y1="0"   x2="64"  y2="512"/>
        <line x1="128" y1="0"   x2="128" y2="512"/>
        <line x1="192" y1="0"   x2="192" y2="512"/>
        <line x1="256" y1="0"   x2="256" y2="512"/>
        <line x1="0" y1="0"   x2="256" y2="0"/>
        <line x1="0" y1="64"  x2="256" y2="64"/>
        <line x1="0" y1="128" x2="256" y2="128"/>
        <line x1="0" y1="192" x2="256" y2="192"/>
        <line x1="0" y1="256" x2="256" y2="256"/>
        <line x1="0" y1="320" x2="256" y2="320"/>
        <line x1="0" y1="384" x2="256" y2="384"/>
        <line x1="0" y1="448" x2="256" y2="448"/>
        <line x1="0" y1="512" x2="256" y2="512"/>
      </g>
      <text x="-8" y="32"  text-anchor="end" font-size="10" fill="#94a3b8">r3</text>
      <text x="-8" y="96"  text-anchor="end" font-size="10" fill="#94a3b8">r4</text>
      <text x="-8" y="160" text-anchor="end" font-size="10" fill="#94a3b8">r5</text>
      <text x="-8" y="224" text-anchor="end" font-size="10" fill="#94a3b8">r6</text>
      <text x="-8" y="288" text-anchor="end" font-size="10" fill="#94a3b8">r7</text>

      <!-- Chair drawn FIRST (behind) -->
      <rect x="96" y="128" width="64" height="128" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
      <text x="128" y="200" text-anchor="middle" font-size="14" fill="#7c2d12" font-weight="700">chair</text>
      <line x1="80" y1="256" x2="176" y2="256" stroke="#b45309" stroke-width="2"/>
      <text x="180" y="252" font-size="10" fill="#b45309">baseY=192</text>

      <!-- Player at row 5, feet at y=192 (2x grid). Player drawn AFTER (in front of chair) BUT feetY < baseY so chair covers player -->
      <!-- To show "behind", draw chair again over player -->
      <rect x="160" y="96" width="64" height="128" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text x="192" y="168" text-anchor="middle" font-size="28">🧍</text>
      <line x1="144" y1="192" x2="240" y2="192" stroke="#1d4ed8" stroke-width="2"/>
      <text x="244" y="188" font-size="10" fill="#1d4ed8">feetY=160</text>
      <!-- chair overhang covers player's lower body -->
      <rect x="96" y="128" width="64" height="128" fill="#fde68a" stroke="#b45309" stroke-width="2" opacity="0.85"/>
      <text x="128" y="200" text-anchor="middle" font-size="14" fill="#7c2d12" font-weight="700">chair</text>
    </g>

    <rect x="405" y="660" width="290" height="22" rx="4" fill="#fee2e2"/>
    <text x="550" y="676" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">feetY 160 &lt; baseY 192 → player BEHIND chair</text>
  </g>

  <!-- ===================== Case C: player beside (row 6) ===================== -->
  <g>
    <rect x="730" y="90" width="330" height="600" rx="10" fill="#fff" stroke="#cbd5e1"/>
    <text x="895" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">C. Player beside (row 6)</text>

    <g transform="translate(750,140)">
      <g stroke="#e2e8f0" stroke-width="1">
        <line x1="0"   y1="0"   x2="0"   y2="512"/>
        <line x1="64"  y1="0"   x2="64"  y2="512"/>
        <line x1="128" y1="0"   x2="128" y2="512"/>
        <line x1="192" y1="0"   x2="192" y2="512"/>
        <line x1="256" y1="0"   x2="256" y2="512"/>
        <line x1="0" y1="0"   x2="256" y2="0"/>
        <line x1="0" y1="64"  x2="256" y2="64"/>
        <line x1="0" y1="128" x2="256" y2="128"/>
        <line x1="0" y1="192" x2="256" y2="192"/>
        <line x1="0" y1="256" x2="256" y2="256"/>
        <line x1="0" y1="320" x2="256" y2="320"/>
        <line x1="0" y1="384" x2="256" y2="384"/>
        <line x1="0" y1="448" x2="256" y2="448"/>
        <line x1="0" y1="512" x2="256" y2="512"/>
      </g>
      <text x="-8" y="32"  text-anchor="end" font-size="10" fill="#94a3b8">r3</text>
      <text x="-8" y="96"  text-anchor="end" font-size="10" fill="#94a3b8">r4</text>
      <text x="-8" y="160" text-anchor="end" font-size="10" fill="#94a3b8">r5</text>
      <text x="-8" y="224" text-anchor="end" font-size="10" fill="#94a3b8">r6</text>
      <text x="-8" y="288" text-anchor="end" font-size="10" fill="#94a3b8">r7</text>

      <!-- Chair at col 1, base row 6 -->
      <rect x="32" y="128" width="64" height="128" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
      <text x="64" y="200" text-anchor="middle" font-size="14" fill="#7c2d12" font-weight="700">chair</text>
      <line x1="16" y1="256" x2="112" y2="256" stroke="#b45309" stroke-width="2"/>
      <text x="116" y="252" font-size="10" fill="#b45309">baseY=192</text>

      <!-- Player at col 3, row 6 -->
      <rect x="160" y="128" width="64" height="128" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
      <text x="192" y="200" text-anchor="middle" font-size="28">🧍</text>
      <line x1="144" y1="256" x2="240" y2="256" stroke="#1d4ed8" stroke-width="2"/>
      <text x="244" y="252" font-size="10" fill="#1d4ed8">feetY=192</text>

      <!-- collision tile marker on chair base -->
      <rect x="32" y="192" width="64" height="64" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4 3"/>
      <text x="64" y="300" text-anchor="middle" font-size="9" fill="#dc2626">collision tile</text>
    </g>

    <rect x="750" y="660" width="290" height="22" rx="4" fill="#f1f5f9"/>
    <text x="895" y="676" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">feetY = baseY → tie. Collision stops the player here.</text>
  </g>
</svg>
