<svg width="100%" viewBox="0 0 1200 820" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">
  <title>Pixel Eruv — Anatomy of a Map</title>
  <desc>A small example map (3 tiles) showing what the World Sim stores per map: the tile grid with per-tile values (traversable, sprite), entities placed on tiles with their components, and triggers registered on tiles via the trigger registry. Tile (0,0) has a player entity with equipment; tile (1,0) has a door entity with a block access trigger and an entity-bound notify trigger; tile (2,0) has a button (no entity, no trigger on the tile — the button is handled by an extension that registered for the click:left input type).</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#fafaf9"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Anatomy of a Map</text>
  <text x="600" y="52" text-anchor="middle" font-size="13" fill="#64748b">3-tile example · tile values · entities (with components) · triggers (from registry)</text>

  <!-- ============================================ -->
  <!-- MAP MANIFEST (top) -->
  <!-- ============================================ -->
  <rect x="40" y="72" width="1120" height="56" rx="8" fill="#ede9fe" stroke="#475569" stroke-width="1"/>
  <text x="60" y="92" font-size="13" font-weight="700" fill="#0f172a">Map manifest</text>
  <text x="60" y="110" font-size="12" fill="#64748b">map_id: "lobby"</text>
  <text x="220" y="110" font-size="12" fill="#64748b">size: 3×1</text>
  <text x="320" y="110" font-size="12" fill="#64748b">tileset: "lobby.png"</text>
  <text x="470" y="110" font-size="12" fill="#64748b">tiled_json: s3://…/lobby.json</text>
  <text x="700" y="110" font-size="12" fill="#64748b">spawn: (0,0)</text>
  <text x="820" y="110" font-size="12" fill="#64748b">owner_ext: "office-ext"</text>

  <!-- ============================================ -->
  <!-- TILE GRID (left, 3 tiles side by side) -->
  <!-- ============================================ -->
  <text x="40" y="156" font-size="13" font-weight="700" fill="#0f172a">Tile grid (in-memory)</text>
  <text x="40" y="172" font-size="11" fill="#64748b">Each cell: traversable flag + sprite ref + entity refs. Entities and triggers are looked up by tile coordinate.</text>

  <!-- Tile (0,0) - Player -->
  <rect x="40" y="184" width="280" height="240" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="180" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Tile (0, 0)</text>
  <text x="180" y="220" text-anchor="middle" font-size="11" fill="#64748b">spawn point</text>

  <!-- Tile values -->
  <rect x="56" y="232" width="248" height="48" rx="4" fill="#fafaf9" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="64" y="248" font-size="11" font-weight="600" fill="#0f172a">Tile values</text>
  <text x="64" y="264" font-size="11" fill="#64748b">traversable: true</text>
  <text x="180" y="264" font-size="11" fill="#64748b">sprite: "floor-1"</text>
  <text x="64" y="276" font-size="11" fill="#64748b">sprite layer: 0</text>

  <!-- Entity on tile -->
  <rect x="56" y="292" width="248" height="120" rx="4" fill="#dbeafe" stroke="#475569" stroke-width="0.5"/>
  <text x="64" y="308" font-size="11" font-weight="700" fill="#0f172a">Entity: user-42 (player)</text>
  <line x1="64" y1="314" x2="296" y2="314" stroke="#94a3b8" stroke-width="0.4"/>
  <text x="64" y="328" font-size="11" fill="#64748b">• Position { x:0, y:0, dir:"east" }</text>
  <text x="64" y="342" font-size="11" fill="#64748b">• AvatarAppearance { sprite:"bob" }</text>
  <text x="64" y="356" font-size="11" fill="#64748b">• Equipment { main_hand:"bow-7", off_hand:null }</text>
  <text x="64" y="370" font-size="11" fill="#64748b">• Inventory [ {arrow-1, arrow-2} ]</text>
  <text x="64" y="386" font-size="11" fill="#64748b">• Owner { user_id:42 }</text>
  <text x="64" y="400" font-size="11" fill="#64748b">  (Inventory + Equipment: owner-only replication)</text>

  <!-- No triggers on this tile -->
  <text x="180" y="420" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">no triggers registered on this tile</text>

  <!-- Tile (1,0) - Door -->
  <rect x="340" y="184" width="280" height="240" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="480" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Tile (1, 0)</text>
  <text x="480" y="220" text-anchor="middle" font-size="11" fill="#64748b">door</text>

  <!-- Tile values -->
  <rect x="356" y="232" width="248" height="48" rx="4" fill="#fafaf9" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="364" y="248" font-size="11" font-weight="600" fill="#0f172a">Tile values</text>
  <text x="364" y="264" font-size="11" fill="#64748b">traversable: false</text>
  <text x="480" y="264" font-size="11" fill="#64748b">sprite: "door-closed"</text>
  <text x="364" y="276" font-size="11" fill="#64748b">sprite layer: 1 (above floor)</text>

  <!-- Entity on tile -->
  <rect x="356" y="292" width="248" height="76" rx="4" fill="#dbeafe" stroke="#475569" stroke-width="0.5"/>
  <text x="364" y="308" font-size="11" font-weight="700" fill="#0f172a">Entity: door-1</text>
  <line x1="364" y1="314" x2="596" y2="314" stroke="#94a3b8" stroke-width="0.4"/>
  <text x="364" y="328" font-size="11" fill="#64748b">• Position { x:1, y:0 }</text>
  <text x="364" y="342" font-size="11" fill="#64748b">• AvatarAppearance { sprite:"door" }</text>
  <text x="364" y="356" font-size="11" fill="#64748b">• DoorState { open:false, locked:true }</text>

  <!-- Triggers on tile -->
  <rect x="356" y="376" width="248" height="40" rx="4" fill="#fee2e2" stroke="#475569" stroke-width="0.5"/>
  <text x="364" y="392" font-size="11" font-weight="700" fill="#0f172a">Triggers on this tile</text>
  <text x="364" y="408" font-size="11" fill="#64748b">• door-1-access (block) · door-1-notify (entity)</text>

  <!-- Tile (2,0) - Button -->
  <rect x="640" y="184" width="280" height="240" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <text x="780" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Tile (2, 0)</text>
  <text x="780" y="220" text-anchor="middle" font-size="11" fill="#64748b">button (visual only)</text>

  <!-- Tile values -->
  <rect x="656" y="232" width="248" height="48" rx="4" fill="#fafaf9" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="664" y="248" font-size="11" font-weight="600" fill="#0f172a">Tile values</text>
  <text x="664" y="264" font-size="11" fill="#64748b">traversable: true</text>
  <text x="780" y="264" font-size="11" fill="#64748b">sprite: "button-red"</text>
  <text x="664" y="276" font-size="11" fill="#64748b">sprite layer: 1</text>

  <!-- No entity on tile -->
  <rect x="656" y="292" width="248" height="40" rx="4" fill="#fafaf9" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="780" y="308" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">no entity on this tile</text>
  <text x="780" y="322" text-anchor="middle" font-size="11" fill="#94a3b8">(button is purely a trigger)</text>

  <!-- No trigger on tile — handled by input handler -->
  <rect x="656" y="292" width="248" height="76" rx="4" fill="#dbeafe" stroke="#475569" stroke-width="0.5"/>
  <text x="664" y="308" font-size="11" font-weight="700" fill="#0f172a">No trigger on this tile</text>
  <text x="664" y="324" font-size="11" fill="#64748b">The button is a visual sprite.</text>
  <text x="664" y="338" font-size="11" fill="#64748b">office-ext registered for</text>
  <text x="664" y="352" font-size="11" fill="#64748b">input "click:left" — when a</text>
  <text x="664" y="366" font-size="11" fill="#64748b">player clicks here, it self-filters.</text>

  <!-- ============================================ -->
  <!-- SPATIAL INDEX (right side) -->
  <!-- ============================================ -->
  <rect x="940" y="184" width="220" height="240" rx="8" fill="#ccfbf1" stroke="#475569" stroke-width="1"/>
  <text x="1050" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Spatial index</text>
  <text x="1050" y="220" text-anchor="middle" font-size="11" fill="#64748b">(map_id, x, y) → entity_ids[]</text>
  <line x1="956" y1="228" x2="1144" y2="228" stroke="#94a3b8" stroke-width="0.4"/>
  <text x="956" y="246" font-size="11" font-family="ui-monospace, monospace" fill="#0f172a">(lobby,0,0) → [user-42]</text>
  <text x="956" y="266" font-size="11" font-family="ui-monospace, monospace" fill="#0f172a">(lobby,1,0) → [door-1]</text>
  <text x="956" y="286" font-size="11" font-family="ui-monospace, monospace" fill="#0f172a">(lobby,2,0) → []</text>
  <line x1="956" y1="298" x2="1144" y2="298" stroke="#94a3b8" stroke-width="0.4"/>
  <text x="956" y="316" font-size="11" font-weight="600" fill="#0f172a">Used by:</text>
  <text x="956" y="332" font-size="11" fill="#64748b">• AOI filter (replication)</text>
  <text x="956" y="346" font-size="11" fill="#64748b">• Movement validation</text>
  <text x="956" y="360" font-size="11" fill="#64748b">• Proximity range queries</text>
  <text x="956" y="374" font-size="11" fill="#64748b">• LOS raycast</text>
  <text x="956" y="388" font-size="11" fill="#64748b">• Trigger lookup by tile</text>
  <text x="956" y="408" font-size="11" font-style="italic" fill="#94a3b8">Reverse: entity_id → tile</text>

  <!-- ============================================ -->
  <!-- TRIGGER REGISTRY (bottom) -->
  <!-- ============================================ -->
  <text x="40" y="448" font-size="13" font-weight="700" fill="#0f172a">Trigger registry (kernel-side, indexed by trigger_id and by tile)</text>
  <text x="40" y="464" font-size="11" fill="#64748b">Registered by extensions via `extension.&lt;ext_id&gt;.register_triggers`. The kernel consults this on movement (access), enter/exit (event), and ActionFrame (input handler broadcast).</text>

  <!-- Trigger 1: door-1-access -->
  <rect x="40" y="478" width="360" height="160" rx="8" fill="#fee2e2" stroke="#475569" stroke-width="1"/>
  <text x="56" y="498" font-size="12" font-weight="700" fill="#0f172a">door-1-access</text>
  <text x="56" y="514" font-size="11" fill="#64748b">category: access · binding: tile · owner: office-ext</text>
  <line x1="56" y1="522" x2="384" y2="522" stroke="#94a3b8" stroke-width="0.4"/>
  <text x="56" y="538" font-size="11" font-family="ui-monospace, monospace" fill="#0f172a">behavior: "block"</text>
  <text x="56" y="554" font-size="11" font-family="ui-monospace, monospace" fill="#0f172a">tiles: [{map:"lobby", x:1, y:0}]</text>
  <line x1="56" y1="562" x2="384" y2="562" stroke="#94a3b8" stroke-width="0.4"/>
  <text x="56" y="578" font-size="11" fill="#64748b">Kernel: cache in spatial index.</text>
  <text x="56" y="592" font-size="11" fill="#64748b">Refuse move locally — no NATS.</text>
  <text x="56" y="606" font-size="11" fill="#64748b">Door is locked; movement blocked.</text>
  <text x="56" y="624" font-size="11" font-style="italic" fill="#94a3b8">If behavior were "ask": query ext,</text>
  <text x="56" y="636" font-size="11" font-style="italic" fill="#94a3b8">defer move, wait reply (ttl_ms).</text>

  <!-- Trigger 2: door-1-notify -->
  <rect x="420" y="478" width="360" height="160" rx="8" fill="#ccfbf1" stroke="#475569" stroke-width="1"/>
  <text x="436" y="498" font-size="12" font-weight="700" fill="#0f172a">door-1-notify</text>
  <text x="436" y="514" font-size="11" fill="#64748b">category: event · binding: entity · owner: office-ext</text>
  <line x1="436" y1="522" x2="764" y2="522" stroke="#94a3b8" stroke-width="0.4"/>
  <text x="436" y="538" font-size="11" font-family="ui-monospace, monospace" fill="#0f172a">behavior: "notify"</text>
  <text x="436" y="554" font-size="11" font-family="ui-monospace, monospace" fill="#0f172a">entity_id: "door-1"</text>
  <text x="436" y="570" font-size="11" font-family="ui-monospace, monospace" fill="#0f172a">events: ["enter","exit"]</text>
  <line x1="436" y1="578" x2="764" y2="578" stroke="#94a3b8" stroke-width="0.4"/>
  <text x="436" y="594" font-size="11" fill="#64748b">Kernel: point-to-point to office-ext</text>
  <text x="436" y="608" font-size="11" fill="#64748b">when a player enters/exits/interacts.</text>
  <text x="436" y="624" font-size="11" font-style="italic" fill="#94a3b8">Subject: entity.door-1.notify.&lt;event&gt;</text>
  <text x="436" y="636" font-size="11" font-style="italic" fill="#94a3b8">Fire-and-forget — no reply.</text>

  <!-- Trigger 3: button-click-left (input handler) -->
  <rect x="800" y="478" width="360" height="160" rx="8" fill="#dbeafe" stroke="#475569" stroke-width="1"/>
  <text x="816" y="498" font-size="12" font-weight="700" fill="#0f172a">office-click-left</text>
  <text x="816" y="514" font-size="11" fill="#64748b">category: action · binding: input · owner: office-ext</text>
  <line x1="816" y1="522" x2="1144" y2="522" stroke="#94a3b8" stroke-width="0.4"/>
  <text x="816" y="538" font-size="11" font-family="ui-monospace, monospace" fill="#0f172a">input: "click:left"</text>
  <text x="816" y="554" font-size="11" font-family="ui-monospace, monospace" fill="#0f172a">(no tile binding, no max_range)</text>
  <line x1="816" y1="562" x2="1144" y2="562" stroke="#94a3b8" stroke-width="0.4"/>
  <text x="816" y="578" font-size="11" fill="#64748b">Kernel: compute range, LOS,</text>
  <text x="816" y="592" font-size="11" fill="#64748b">entities_on_tile, equipment →</text>
  <text x="816" y="606" font-size="11" fill="#64748b">broadcast to all registered.</text>
  <text x="816" y="624" font-size="11" font-style="italic" fill="#94a3b8">Subject: input.click.left</text>
  <text x="816" y="636" font-size="11" font-style="italic" fill="#94a3b8">Self-filters: is button sprite here?</text>

  <!-- ============================================ -->
  <!-- LINKS: tiles → trigger registry -->
  <!-- ============================================ -->
  <!-- Tile (1,0) → door-1-access -->
  <path d="M 480 424 C 480 446, 220 446, 220 478" stroke="#7c3aed" stroke-width="1.2" fill="none" stroke-dasharray="4 3" marker-end="url(#arr-purple)" opacity="0.6"/>
  <!-- Tile (1,0) → door-1-notify -->
  <path d="M 480 424 C 480 446, 600 446, 600 478" stroke="#7c3aed" stroke-width="1.2" fill="none" stroke-dasharray="4 3" marker-end="url(#arr-purple)" opacity="0.6"/>
  <!-- Tile (2,0) → office-click-left (input handler, not tile-bound) -->
  <path d="M 780 424 C 780 446, 980 446, 980 478" stroke="#7c3aed" stroke-width="1.2" fill="none" stroke-dasharray="4 3" marker-end="url(#arr-purple)" opacity="0.4"/>
  <text x="870" y="440" font-size="10" font-style="italic" fill="#94a3b8">not tile-bound (input handler)</text>

  <!-- ============================================ -->
  <!-- LEGEND / NOTES (bottom) -->
  <!-- ============================================ -->
  <rect x="40" y="664" width="1120" height="138" rx="8" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="6 5" opacity="0.5"/>
  <text x="600" y="686" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">What lives where</text>

  <rect x="60" y="700" width="14" height="14" rx="3" fill="#ede9fe" stroke="#475569" stroke-width="1"/>
  <text x="80" y="712" font-size="11" font-weight="600" fill="#0f172a">Map manifest</text>
  <text x="80" y="726" font-size="11" fill="#64748b">Static: id, size, tileset, spawn, owner_ext. Loaded from SeaweedFS at startup.</text>
  <text x="80" y="740" font-size="11" fill="#64748b">Tile sprites are render-only; the kernel never reads them for logic.</text>

  <rect x="60" y="754" width="14" height="14" rx="3" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
  <text x="80" y="766" font-size="11" font-weight="600" fill="#0f172a">Tile grid</text>
  <text x="80" y="780" font-size="11" fill="#64748b">Per-tile: traversable flag + sprite ref. Entities and triggers are not stored</text>
  <text x="80" y="794" font-size="11" fill="#64748b">in the tile; they are looked up via the spatial index and trigger registry.</text>

  <rect x="430" y="700" width="14" height="14" rx="3" fill="#dbeafe" stroke="#475569" stroke-width="1"/>
  <text x="450" y="712" font-size="11" font-weight="600" fill="#0f172a">Entities (ECS)</text>
  <text x="450" y="726" font-size="11" fill="#64748b">Each entity = ID + components (Position, Appearance, Equipment, ...).</text>
  <text x="450" y="740" font-size="11" fill="#64748b">Items in inventory/equipped lose Position; replicated to owner only.</text>
  <text x="450" y="754" font-size="11" fill="#64748b">A tile need not have an entity (e.g. button tile is trigger-only).</text>
  <text x="450" y="772" font-size="11" font-style="italic" fill="#94a3b8">Spatial index is the lookup, not the ECS itself.</text>

  <rect x="800" y="700" width="14" height="14" rx="3" fill="#ccfbf1" stroke="#475569" stroke-width="1"/>
  <text x="820" y="712" font-size="11" font-weight="600" fill="#0f172a">Spatial index</text>
  <text x="820" y="726" font-size="11" fill="#64748b">(map_id, x, y) → entity_ids[]. Reverse: entity_id → tile.</text>
  <text x="820" y="740" font-size="11" fill="#64748b">Drives AOI, movement, proximity, LOS, trigger lookup.</text>
  <rect x="800" y="754" width="14" height="14" rx="3" fill="#fee2e2" stroke="#475569" stroke-width="1"/>
  <text x="820" y="766" font-size="11" font-weight="600" fill="#0f172a">Trigger registry</text>
  <text x="820" y="780" font-size="11" fill="#64748b">All triggers across the map, indexed by trigger_id and by tile.</text>
  <text x="820" y="794" font-size="11" fill="#64748b">One trigger can cover many tiles; one tile can host many triggers.</text>

</svg>
