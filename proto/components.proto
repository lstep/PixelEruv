syntax = "proto3";

package pixeleruv;

option go_package = "github.com/lstep/pixeleruv/backend/internal/pb;pb";

// Component payloads. Each replicated component is encoded as a protobuf
// message and carried inside ComponentData.data (see replication.proto).
// The component_id field maps to a registered component type ID.

// Component ID 1 — Position
// Present on avatars, objects, decorations. The only component we need
// for the lite MVP.
message Position {
  float x = 1;          // tile coordinates (float for sub-tile movement)
  float y = 2;
  string map_id = 3;
  uint32 dir = 4;        // 0=down, 1=left, 2=right, 3=up
}

// Component ID 2 — EntityState
// Generic opaque state string for simple interactive props (e.g. a light
// switch box toggling "on"/"off"). Extensions set this via an input-trigger
// reply; the client picks a sprite frame/behavior based on the value.
message EntityState {
  string state = 1;
}

// Component ID 3 — Appearance
// Carries the Tiled global tile ID (gid) for base entities authored on the
// "Entities" object layer, so the frontend can render the correct tile sprite
// (resolved via the map's tilesets) instead of a default character sprite.
// For player avatars (gid=0), sprite_index selects which character sheet to
// use. The server assigns it at provision time (deterministic from entity ID)
// so all clients agree on the same sprite for the same player.
message Appearance {
  uint32 gid = 1;          // Tiled global tile ID (0 = no sprite)
  uint32 sprite_index = 2; // Character sheet index for player avatars (0 if unused)
}

// Component ID 4 — DisplayName
// Player avatar display name, shown as a name tag above the sprite and
// stamped on chat messages. Only present on player avatars (not props or
// decorations). Set at provision time (PocketBase for logged-in, "Guest
// <last4>" for guests) and updated via SetNameFrame. See
// documentation/plans/2026-07-07-avatar-name-tags-design.md.
message DisplayName {
  string name = 1;
}
