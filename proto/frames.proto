syntax = "proto3";

package pixeleruv;

option go_package = "github.com/lstep/pixeleruv/backend/internal/pb;pb";

import "replication.proto";

// === Client → Server frames ===

message ClientFrame {
  oneof payload {
    AuthFrame auth = 1;
    InputFrame input = 2;
    PingFrame ping = 3;
    ActionFrame action = 4;
    ChatFrame chat = 5;
    SetNameFrame set_name = 6;
    SetSpriteBaseFrame set_sprite_base = 7;
  }
}

message AuthFrame {
  string id_token = 1;             // dummy for lite MVP ("dev" accepted)
  // W3C traceparent of the browser span that initiated this connection.
  // Lets the pusher parent its server spans to the client-side trace.
  string traceparent = 2;
}

message InputFrame {
  uint32 seq = 1;
  uint32 client_tick = 2;
  InputState state = 3;
  // W3C traceparent of the browser span for this input (e.g. ws.send_input).
  string traceparent = 4;
}

message InputState {
  bool up = 1;
  bool down = 2;
  bool left = 3;
  bool right = 4;
  bool run = 5;
}

message PingFrame {}

// ActionFrame is a player-initiated input trigger (see
// 14-zones-and-interactions.md §3a) — a key press or click that the kernel
// broadcasts to extensions registered for that input type. Unlike InputFrame
// (continuous movement), this is a single discrete event.
message ActionFrame {
  uint32 seq = 1;
  string input = 2;         // e.g. "key:E", "click:left"
  string traceparent = 3;
}

// ChatFrame is a client-sent chat message on a given channel. The server
// stamps display_name + timestamp before broadcasting (see ChatMessageFrame).
// Ephemeral — not persisted. Text is truncated to 500 runes server-side.
message ChatFrame {
  string channel = 1;       // "global" or "proximity"
  string text = 2;
  string traceparent = 3;
}

// SetNameFrame is a client request to change their display name. The server
// validates (max 20 chars, ASCII printable only), updates Entity.DisplayName,
// replicates the change to all clients, and persists to PocketBase for
// logged-in users. See
// documentation/plans/2026-07-07-avatar-name-tags-design.md.
message SetNameFrame {
  string name = 1;
  string traceparent = 2;
}

// SetSpriteBaseFrame is a client request to change their character sheet. The
// server validates the sprite_base ID exists in the sprite_bases collection,
// updates Entity.SpriteBase, marks it dirty for replication, and persists to
// PocketBase for logged-in users. Guests are rejected (no PB record). See
// documentation/plans/2026-07-07-sprite-selection-design.md.
message SetSpriteBaseFrame {
  string sprite_base = 1;   // sprite_bases record ID; empty = revert to fallback
  string traceparent = 2;
}

// === Server → Client frames ===

message ServerFrame {
  oneof payload {
    ReplicationBatch replication = 1;
    AuthResultFrame auth_result = 2;
    ErrorFrame error = 3;
    PongFrame pong = 4;
    ActionResultFrame action_result = 5;
    AvTokenFrame av_token = 6;
    ChatMessageFrame chat_message = 7;
    MapTransitionFrame map_transition = 8;
  }
}

// ActionResultFrame reports the outcome of an ActionFrame: whether any
// extension handled it, and why not if none did (see 18-extensions.md §3a).
message ActionResultFrame {
  uint32 seq = 1;
  bool ok = 2;
  string reason = 3;        // "no_handler", "timeout", "" on success
}

message AuthResultFrame {
  bool ok = 1;
  string client_id = 2;
  string entity_id = 3;
  string sub = 4;             // OIDC subject (user identity)
  string map_id = 5;          // player's current map (initial map to load)
}

message ErrorFrame {
  uint32 code = 1;
  string message = 2;
}

message PongFrame {}

// AvTokenFrame carries a LiveKit join/leave instruction from ext-av to the
// browser. On "join", the client connects to the LiveKit room with the
// provided token + url. On "leave", the client disconnects from that room.
// See documentation/plans/2026-07-06-livekit-av-design.md.
message AvTokenFrame {
  string room = 1;              // LiveKit room name; empty on "leave"
  string token = 2;             // LiveKit JWT; empty on "leave"
  string url = 3;               // LiveKit server URL (ws://...)
  string action = 4;            // "join" or "leave"
  repeated string members = 5;  // entity IDs in the group (proximity only; empty for zones)
}

// ChatMessageFrame is a server-stamped chat message delivered to one or more
// clients. The server stamps display_name + timestamp; clients never author
// these directly. Ephemeral — not persisted. See
// documentation/plans/2026-07-07-chat-design.md.
message ChatMessageFrame {
  string channel = 1;       // "global" or "proximity"
  string entity_id = 2;     // sender's entity id
  string display_name = 3;  // server-stamped; "Guest <short>" for guests
  string text = 4;
  uint64 timestamp = 5;     // unix millis, server-stamped
}

// MapTransitionFrame tells the client to switch to a new map. The client
// destroys all current sprites, loads the new tilemap + tilesets, and lets
// the replication stream re-spawn entities. See
// documentation/plans/2026-07-11-multimap-and-pb-embedding-design.md.
message MapTransitionFrame {
  string map_id = 1;        // new map name
  float spawn_x = 2;        // spawn X on new map
  float spawn_y = 3;        // spawn Y on new map
}
