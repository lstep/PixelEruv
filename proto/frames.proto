syntax = "proto3";

package pixeleruv;

option go_package = "github.com/lstep/pixeleruv/backend/internal/pb;pb";

import "replication.proto";

// === Client → Server frames ===

message ClientFrame {
  oneof payload {
    AuthFrame auth = 1;
    InputFrame input = 2;
    PingFrame ping = 3;
    ActionFrame action = 4;
    ChatFrame chat = 5;
    SetNameFrame set_name = 6;
    SetSpriteBaseFrame set_sprite_base = 7;
    SetPlayerOptionsFrame set_player_options = 8;
    SetStatusFrame set_status = 9;
    RecordingRequestFrame recording = 10;
  }
}

message AuthFrame {
  string id_token = 1;             // dummy for lite MVP ("dev" accepted)
  // W3C traceparent of the browser span that initiated this connection.
  // Lets the pusher parent its server spans to the client-side trace.
  string traceparent = 2;
  // Client-generated device ID (UUID stored in localStorage). Stable across
  // sessions for the same browser, used as a ban target for guests. Evadable
  // by clearing storage — one layer of three (user_id, IP, device_id).
  string device_id = 3;
}

message InputFrame {
  uint32 seq = 1;
  uint32 client_tick = 2;
  InputState state = 3;
  // W3C traceparent of the browser span for this input (e.g. ws.send_input).
  string traceparent = 4;
}

message InputState {
  bool up = 1;
  bool down = 2;
  bool left = 3;
  bool right = 4;
  bool run = 5;
}

message PingFrame {}

// ActionFrame is a player-initiated input trigger (see
// 14-zones-and-interactions.md §3a) — a key press or click that the kernel
// broadcasts to extensions registered for that input type. Unlike InputFrame
// (continuous movement), this is a single discrete event.
//
// For the two-phase interaction flow (see
// documentation/plans/2026-07-15-interaction-system-design.md), the client
// first sends input="key:E" with empty entity_id/action_id. If the server
// returns available_actions, the user picks one and the client sends a
// second ActionFrame with input="action:execute", entity_id set to the
// target entity, and action_id set to the chosen action.
message ActionFrame {
  uint32 seq = 1;
  string input = 2;         // e.g. "key:E", "click:left", "action:execute"
  string traceparent = 3;
  string entity_id = 4;     // target entity for "action:execute" (empty for "key:E")
  string action_id = 5;     // which action to run (e.g. "activate", "toggle")
}

// ChatFrame is a client-sent chat message on a given channel. The server
// stamps display_name + timestamp before broadcasting (see ChatMessageFrame).
// Ephemeral — not persisted. Text is truncated to 500 runes server-side.
message ChatFrame {
  string channel = 1;       // "global" or "proximity"
  string text = 2;
  string traceparent = 3;
}

// SetNameFrame is a client request to change their display name. The server
// validates (max 20 chars, ASCII printable only), updates Entity.DisplayName,
// replicates the change to all clients, and persists to PocketBase for
// logged-in users. See
// documentation/plans/2026-07-07-avatar-name-tags-design.md.
message SetNameFrame {
  string name = 1;
  string traceparent = 2;
}

// SetSpriteBaseFrame is a client request to change their character sheet. The
// server validates the sprite_base ID exists in the sprite_bases collection,
// updates Entity.SpriteBase, marks it dirty for replication, and persists to
// PocketBase for logged-in users. Guests are rejected (no PB record). See
// documentation/plans/2026-07-07-sprite-selection-design.md.
message SetSpriteBaseFrame {
  string sprite_base = 1;   // sprite_bases record ID; empty = revert to fallback
  string traceparent = 2;
}

// SetPlayerOptionsFrame is a client request to update their player options
// (e.g. show_own_name_tag). The server persists the full options JSON to
// PocketBase for logged-in users. Guests have no PB record — options are
// session-only. The options field is a full JSON replace (not a partial
// merge), mirroring the extension_options pattern.
message SetPlayerOptionsFrame {
  string options = 1;       // JSON-encoded player options (full replace)
  string traceparent = 2;
}

// SetStatusFrame is a client request to change their presence status. The
// server validates the enum range (0-2), updates Entity.Status, replicates the
// change to all clients via the DisplayName component, and broadcasts it on
// NATS so ext-av can enforce DND A/V exclusion. Session-only — not persisted
// to PocketBase; resets to AVAILABLE (0) on connect. See
// documentation/plans/2026-07-15-player-status-design.md.
message SetStatusFrame {
  uint32 status = 1;        // 0=AVAILABLE, 1=BUSY, 2=DO_NOT_DISTURB
  string traceparent = 2;
}

// RecordingRequestFrame is an admin request to start or stop recording (or
// live-streaming) the LiveKit A/V room they are currently in. The pusher
// forwards it to ext-rec on the recording.<action> NATS subject. ext-rec
// authorizes via worldsim.entity_info (admin only) and starts/stops a
// LiveKit Room Composite Egress. See
// documentation/plans/2026-07-18-recording-design.md.
message RecordingRequestFrame {
  string action = 1;    // "start" | "stop"
  string room = 2;      // LiveKit room name (zone-<slug>)
  string target = 3;    // "mp4" | "youtube" (ignored on stop)
  string traceparent = 4;
  // Per-recording YouTube override (target="youtube" only). When empty,
  // ext-rec falls back to the world_options defaults (Admin > World Options).
  // Populated by the frontend's "Stream to YouTube" confirm modal so the
  // host can confirm or change the RTMP URL / stream key for this recording
  // without editing the global defaults.
  string youtube_rtmp_url = 5;
  string youtube_stream_key = 6;
}

// === Server → Client frames ===

message ServerFrame {
  oneof payload {
    ReplicationBatch replication = 1;
    AuthResultFrame auth_result = 2;
    ErrorFrame error = 3;
    PongFrame pong = 4;
    ActionResultFrame action_result = 5;
    AvTokenFrame av_token = 6;
    ChatMessageFrame chat_message = 7;
    MapTransitionFrame map_transition = 8;
    AdminInfoFrame admin_info = 9;
    MapOptionsUpdateFrame map_options_update = 10;
    RecordingStateFrame recording_state = 11;
    RecordingActiveFrame recording_active = 12;
  }
}

// ActionResultFrame reports the outcome of an ActionFrame: whether any
// extension handled it, and why not if none did (see 18-extensions.md §3a).
// For popup-mode interactions, available_actions carries the actions the
// client should display in the interaction popup (see
// documentation/plans/2026-07-15-interaction-system-design.md).
message ActionResultFrame {
  uint32 seq = 1;
  bool ok = 2;
  string reason = 3;        // "no_handler", "timeout", "" on success
  repeated AvailableAction available_actions = 4;  // popup actions (empty for immediate mode)
}

// AvailableAction is a single action the user can choose from the
// interaction popup. The client groups actions by entity_label and
// displays label as the button text.
message AvailableAction {
  string entity_id = 1;     // entity the action targets
  string action_id = 2;     // action verb (e.g. "activate", "toggle")
  string label = 3;         // user-facing label (e.g. "Activate")
  string entity_label = 4;  // entity type label for popup grouping (e.g. "light")
}

message AuthResultFrame {
  bool ok = 1;
  string client_id = 2;
  string entity_id = 3;
  string sub = 4;             // OIDC subject (user identity)
  string map_id = 5;          // player's current map (initial map to load)
  string ip = 6;              // client IP (pusher→worldsim only; not sent to browser)
  bool is_admin = 7;          // admin status (worldsim→pusher→browser)
  string device_id = 8;       // client device ID (pusher→worldsim transport)
  bool banned = 9;            // worldsim→pusher: client is banned, reject connection
  string ban_reason = 10;     // worldsim→pusher→browser: human-readable ban reason
  uint64 ban_until = 11;      // worldsim→pusher→browser: unix timestamp expiry (0 = permanent)
  string map_options = 12;    // JSON-encoded options for the player's current map
  string player_options = 13; // JSON-encoded player options
  repeated MapWarning map_warnings = 14; // non-fatal validation warnings for the player's map
  string map_error = 15;      // fatal map validation error (map not loaded); client shows black overlay
}

// MapWarning is a single non-fatal validation issue for a map. entity_id is
// empty for map-level warnings (e.g. "collision grid is nil"); the frontend
// draws a red outline on entities with warnings and logs the message.
message MapWarning {
  string entity_id = 1; // entity the warning is about, or "" for map-level
  string message = 2;   // human-readable warning text
}

message ErrorFrame {
  uint32 code = 1;
  string message = 2;
}

message PongFrame {}

// AvTokenFrame carries a LiveKit join/leave instruction from ext-av to the
// browser. On "join", the client connects to the LiveKit room with the
// provided token + url. On "leave", the client disconnects from that room.
// See documentation/plans/2026-07-06-livekit-av-design.md.
message AvTokenFrame {
  string room = 1;              // LiveKit room name; empty on "leave"
  string token = 2;             // LiveKit JWT; empty on "leave"
  string url = 3;               // LiveKit server URL (ws://...)
  string action = 4;            // "join" or "leave"
  repeated string members = 5;  // entity IDs in the group (proximity only; empty for zones)
}

// ChatMessageFrame is a server-stamped chat message delivered to one or more
// clients. The server stamps display_name + timestamp; clients never author
// these directly. Ephemeral — not persisted. See
// documentation/plans/2026-07-07-chat-design.md.
message ChatMessageFrame {
  string channel = 1;       // "global" or "proximity"
  string entity_id = 2;     // sender's entity id
  string display_name = 3;  // server-stamped; "Guest <short>" for guests
  string text = 4;
  uint64 timestamp = 5;     // unix millis, server-stamped
}

// MapTransitionFrame tells the client to switch to a new map. The client
// destroys all current sprites, loads the new tilemap + tilesets, and lets
// the replication stream re-spawn entities. See
// documentation/plans/2026-07-11-multimap-and-pb-embedding-design.md.
message MapTransitionFrame {
  string map_id = 1;        // new map name
  float spawn_x = 2;        // spawn X on new map
  float spawn_y = 3;        // spawn Y on new map
  string map_options = 4;  // JSON-encoded options for the new map
  repeated MapWarning map_warnings = 5; // non-fatal validation warnings for the new map
}

// MapOptionsUpdateFrame is sent to connected clients when a map's options are
// edited in the PB admin GUI (hot-reload). The client re-applies map-level
// feature toggles (e.g. day_night_enabled) immediately.
message MapOptionsUpdateFrame {
  string map_options = 1;  // JSON-encoded updated map options
}

// AdminInfoFrame carries admin-only data about entities, sent only to admin
// clients via the client.<id>.admin NATS subject. Never sent to non-admin
// clients. Covers all players (guests and logged-in). Extensible — add fields
// as admin features grow. See documentation/plans/2026-07-11-admin-mode-design.md.
message AdminInfoFrame {
  message EntityAdminInfo {
    string entity_id = 1;
    string ip = 2;           // client IP (all players; in-memory on Entity)
    bool is_guest = 3;       // anonymous session?
    string user_id = 4;      // PocketBase user ID (empty for guests)
    string device_id = 5;    // client device ID (for ban targeting)
  }
  repeated EntityAdminInfo entities = 1;
}

// RecordingStateFrame is sent by ext-rec to the host that requested a
// recording start/stop. status is "active", "stopped", or "error"; on error,
// the error field carries a human-readable message. egress_id is the LiveKit
// Egress ID once a recording is active.
message RecordingStateFrame {
  string room = 1;
  string status = 2;    // "active" | "stopped" | "error"
  string target = 3;    // "mp4" | "youtube"
  string egress_id = 4;
  string error = 5;
}

// RecordingActiveFrame is broadcast by ext-rec to every participant in a
// LiveKit room when a recording starts or stops, so the client can show a
// REC indicator + consent toast. ext-rec publishes per-client on
// client.<id>.recording_active; the pusher forwards each as a ServerFrame.
message RecordingActiveFrame {
  string room = 1;
  bool active = 2;
  string target = 3;    // "mp4" | "youtube"
  string reason = 4;    // "" | "manual" | "admin_stop" | "auto_empty" (only set when active=false)
}
