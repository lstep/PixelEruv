<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Pixel Eruv</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a2e; overflow: hidden; }
      #game { width: 100%; height: 100%; touch-action: none; }
      #version-badge {
        position: fixed;
        bottom: 4px;
        left: 6px;
        font-size: 10px;
        font-family: monospace;
        color: rgba(255, 255, 255, 0.4);
        pointer-events: none;
        z-index: 10000;
        user-select: none;
      }
      /* When the game server is unavailable, dim and disable all floating DOM
         UI (TopMenu, welcome icon, ChatPanel, VideoBar, screen-share windows)
         so the in-canvas "Server not available" overlay effectively grays out
         the whole screen. #game holds the Phaser canvas (with the overlay) and
         is excluded. */
      body.server-unavailable > *:not(#game) {
        pointer-events: none;
        opacity: 0.25;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="version-badge"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
