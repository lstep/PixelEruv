name: Bug Report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, version, device, etc.
      placeholder: e.g. macOS 15, Chrome 126, v1.2.3
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output / screenshots
      description: Please paste any relevant logs or attach screenshots. This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false
