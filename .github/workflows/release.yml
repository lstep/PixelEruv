name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.3). A tag with this name is created if missing."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build and package dist (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: "true"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Go protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Install root npm deps (protoc-gen-es)
        run: npm ci

      - name: Install frontend npm deps
        run: npm ci
        working-directory: frontend

      - name: Generate protobuf code
        run: make proto
        env:
          PATH: ${{ github.workspace }}/node_modules/.bin:${{ env.PATH }}

      - name: Build dist (linux/amd64)
        run: make dist-x86

      - name: Package dist into tar.gz
        run: tar -czf pixeleruv-${{ steps.version.outputs.version }}.tar.gz -C dist .

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: "true"
          files: pixeleruv-${{ steps.version.outputs.version }}.tar.gz
